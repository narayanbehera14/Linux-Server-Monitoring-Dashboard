# Sample nginx site configuration to serve the Linux Server Monitor dashboard
# Save to /etc/nginx/sites-available/linux-server-monitor and enable with a symlink

server {
    listen 80;
    listen [::]:80;

    server_name localhost;

    root /home/liju/linux-server-monitor;
    index report.html;

    access_log /var/log/nginx/linux-server-monitor.access.log;
    error_log /var/log/nginx/linux-server-monitor.error.log;

    location / {
        try_files $uri $uri/ =404;
    }

    # Optional: serve screenshots and logs (read-only)
    location /screenshots/ {
        alias /home/liju/linux-server-monitor/screenshots/;
        autoindex off;
    }

    location /logs/ {
        alias /home/liju/linux-server-monitor/logs/;
        autoindex on;
    }
}
